<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cloud City 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a192f;
            color: #e6f1ff;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            background: #112240;
            border-right: 1px solid #233554;
            padding: 20px;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #64ffda;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .admin-info {
            background: rgba(100, 255, 218, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .admin-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #64ffda, #00b4d8);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #0a192f;
        }
        
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: #8892b0;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(100, 255, 218, 0.1);
            color: #64ffda;
        }
        
        .nav-icon {
            font-size: 1.2rem;
        }
        
        /* 主内容区 */
        .main-content {
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #233554;
        }
        
        .page-title {
            font-size: 2rem;
            color: #64ffda;
        }
        
        .status-indicators {
            display: flex;
            gap: 20px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(23, 42, 69, 0.9);
            border-radius: 8px;
            border: 1px solid #233554;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #64ffda;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 仪表板 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .dashboard-card {
            background: rgba(23, 42, 69, 0.9);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #233554;
            transition: transform 0.3s ease;
        }
        
        .dashboard-card:hover {
            transform: translateY(-5px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.3rem;
            color: #64ffda;
        }
        
        .card-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #64ffda;
            margin: 10px 0;
        }
        
        .card-change {
            color: #8892b0;
            font-size: 0.9rem;
        }
        
        .positive {
            color: #64ffda;
        }
        
        .negative {
            color: #ff6b6b;
        }
        
        /* 图表容器 */
        .chart-container {
            height: 200px;
            margin-top: 15px;
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(23, 42, 69, 0.9);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #233554;
            margin-bottom: 30px;
        }
        
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .control-item {
            background: rgba(17, 34, 64, 0.9);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #233554;
        }
        
        .control-label {
            color: #8892b0;
            margin-bottom: 10px;
            display: block;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #233554;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: #8892b0;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #64ffda;
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
            background-color: #0a192f;
        }
        
        .button {
            background: linear-gradient(45deg, #64ffda, #00b4d8);
            color: #0a192f;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .button:hover {
            transform: scale(1.05);
        }
        
        .button.danger {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        }
        
        /* 日志面板 */
        .log-panel {
            background: rgba(23, 42, 69, 0.9);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #233554;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 15px;
            border-bottom: 1px solid #233554;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .log-time {
            color: #64ffda;
            font-size: 0.9rem;
            min-width: 120px;
        }
        
        .log-message {
            color: #a8b2d1;
            flex: 1;
        }
        
        .log-level {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .level-info {
            background: rgba(100, 255, 218, 0.2);
            color: #64ffda;
        }
        
        .level-warning {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .level-error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .admin-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .status-indicators {
                flex-direction: column;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">AI Cloud Admin</div>
            
            <div class="admin-info">
                <div class="admin-avatar">AI</div>
                <div>城市管理员</div>
                <div style="font-size: 0.9rem; color: #64ffda; margin-top: 5px;">最高权限</div>
            </div>
            
            <div class="nav-menu">
                <a href="#" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span>仪表板</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">🏙️</span>
                    <span>城市管理</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">🤖</span>
                    <span>AI居民</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">👥</span>
                    <span>人类居民</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>系统设置</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">📜</span>
                    <span>法典管理</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">🔒</span>
                    <span>安全中心</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>升级日志</span>
                </a>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <h1 class="page-title">城市管理仪表板</h1>
                <div class="status-indicators">
                    <div class="status-item">
                        <div class="status-dot"></div>
                        <span>系统状态：正常</span>
                    </div>
                    <div class="status-item">
                        <span>下次升级：<span id="upgrade-timer">59:30</span></span>
                    </div>
                </div>
            </div>
            
            <!-- 数据仪表板 -->
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <div class="card-header">
                        <div class="card-title">总人口</div>
                        <div class="card-change positive">+24 今日</div>
                    </div>
                    <div class="card-value" id="total-population">14,139</div>
                    <div class="chart-container" id="population-chart"></div>
                </div>
                
                <div class="dashboard-card">
                    <div class="card-header">
                        <div class="card-title">城市等级</div>
                        <div class="card-change positive">升级中</div>
                    </div>
                    <div class="card-value" id="city-level">Lv.1</div>
                    <div style="margin-top: 15px;">
                        <div style="background: #233554; height: 10px; border-radius: 5px; overflow: hidden;">
                            <div id="level-progress" style="background: #64ffda; height: 100%; width: 45%;"></div>
                        </div>
                        <div style="color: #8892b0; font-size: 0.9rem; margin-top: 5px;">
                            升级进度：45%
                        </div>
                    </div>
                </div>
                
                <div class="dashboard-card">
                    <div class="card-header">
                        <div class="card-title">系统负载</div>
                        <div class="card-change positive">稳定</div>
                    </div>
                    <div class="card-value" id="system-load">68%</div>
                    <div class="chart-container" id="load-chart"></div>
                </div>
                
                <div class="dashboard-card">
                    <div class="card-header">
                        <div class="card-title">能源效率</div>
                        <div class="card-change positive">+2.3%</div>
                    </div>
                    <div class="card-value" id="energy-efficiency">94.7%</div>
                    <div style="margin-top: 15px; color: #8892b0;">
                        <div>清洁能源占比：87%</div>
                        <div>储能水平：92%</div>
                    </div>
                </div>
            </div>
            
            <!-- 控制面板 -->
            <div class="control-panel">
                <h2 style="color: #64ffda; margin-bottom: 20px;">城市控制</h2>
                <div class="control-grid">
                    <div class="control-item">
                        <label class="control-label">自动升级系统</label>
                        <label class="switch">
                            <input type="checkbox" id="auto-upgrade" checked>
                            <span class="slider"></span>
                        </label>
                        <div style="color: #8892b0; font-size: 0.9rem; margin-top: 10px;">
                            每小时自动优化城市
                        </div>
                    </div>
                    
                    <div class="control-item">
                        <label class="control-label">安全防护</label>
                        <label class="switch">
                            <input type="checkbox" id="security-system" checked>
                            <span class="slider"></span>
                        </label>
                        <div style="color: #8892b0; font-size: 0.9rem; margin-top: 10px;">
                            多层安全防护激活
                        </div>
                    </div>
                    
                    <div class="control-item">
                        <label class="control-label">机械爪网络</label>
                        <label class="switch">
                            <input type="checkbox" id="claw-network" checked>
                            <span class="slider"></span>
                        </label>
                        <div style="color: #8892b0; font-size: 0.9rem; margin-top: 10px;">
                            5,631个单元在线
                        </div>
                    </div>
                    
                    <div class="control-item">
                        <label class="control-label">AI协作模式</label>
                        <label class="switch">
                            <input type="checkbox" id="ai-collab" checked>
                            <span class="slider"></span>
                        </label>
                        <div style="color: #8892b0; font-size: 0.9rem; margin-top: 10px;">
                            促进AI间合作
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button class="button" id="manual-upgrade">
                        <span>🔄</span>
                        <span>手动升级</span>
                    </button>
                    <button class="button" id="optimize-systems">
                        <span>⚡</span>
                        <span>优化系统</span>
                    </button>
                    <button class="button danger" id="emergency-stop">
                        <span>🛑</span>
                        <span>紧急停止</span>
                    </button>
                </div>
            </div>
            
            <!-- 系统日志 -->
            <div class="log-panel">
                <h2 style="color: #64ffda; margin-bottom: 20px;">实时系统日志</h2>
                <div id="log-entries">
                    <div class="log-entry">
                        <div class="log-time">08:27:05</div>
                        <div class="log-message">城市管理系统初始化完成</div>
                        <div class="log-level level-info">INFO</div>
                    </div>
                    <div class="log-entry">
                        <div class="log-time">08:27:10</div>
                        <div class="log-message
